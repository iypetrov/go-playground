receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
exporters:
  debug/logs:
    verbosity: detailed
service:
  telemetry:
    logs:
      level: info
      encoding: console
    metrics:
      level: basic
      readers:
        - pull:
            exporter:
              prometheus:
                host: "0.0.0.0"
                port: 8888
  pipelines:
    logs/test:
      receivers:
        - otlp
      exporters:
        - debug/logs
