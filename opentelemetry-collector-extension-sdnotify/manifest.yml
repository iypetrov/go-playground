dist:
  name: otelcol-sdnotify
  description: Custom OpenTelemetry Collector distribution with the sdnotify extension
  output_path: ./_build
  version: 0.0.1

extensions:
  # Local custom extension. The v0.0.0 placeholder is paired with the `replaces`
  # block below so OCB resolves it to the in-tree source.
  - gomod: github.com/iypetrov/opentelemetry-collector-extension-sdnotify/extension/sdnotify v0.0.0
  # Aggregated component health, queried by sdnotify in deep-healthcheck mode
  # over its grpc.health.v1.Health/Watch stream.
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/healthcheckv2extension v0.154.0
  # Bearer-token authenticator. Reads a token from a file (or inline config)
  # and exposes it for other components (e.g. OTLP exporters) to attach as an
  # `Authorization: Bearer ...` header.
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/bearertokenauthextension v0.154.0

receivers:
  # Tails files in a directory and emits each line as a log record.
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/filelogreceiver v0.154.0

exporters:
  # Prints telemetry to the collector's stdout.
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.154.0

# `replaces` paths are resolved relative to the GENERATED _build/go.mod,
# so we go up one directory to reach the extension source.
replaces:
  - github.com/iypetrov/opentelemetry-collector-extension-sdnotify/extension/sdnotify => ../extension/sdnotify
