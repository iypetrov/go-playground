# Sample collector config: tail every *.log under ./input/ and print
# each record to stdout. The sdnotify extension is loaded so the collector
# notifies systemd when running under it (no-op otherwise).
#
# Deep-healthcheck mode is enabled below: sdnotify subscribes to the
# healthcheckv2 extension over gRPC and reflects every aggregated status
# change into a STATUS=<text> line that `systemctl status` displays.

extensions:
  healthcheckv2:
    use_v2: true
    grpc:
      endpoint: localhost:13132
    http:
      endpoint: localhost:13133

  bearertokenauth:
    # Path to a file whose contents are used as the bearer token. The default
    # scheme is "Bearer", so requests get `Authorization: Bearer <contents>`.
    # Wire this extension into a receiver's or exporter's `auth.authenticator:`
    # field to actually use it.
    filename: /etc/otelcol/bearer.token

  sdnotify:
    # Set to true to refuse to start when not supervised by systemd.
    fail_if_not_supervised: false
    # The systemd watchdog pinger auto-enables whenever systemd has set
    # WATCHDOG_USEC (typically via WatchdogSec= in the unit file). No knob.
    # Subscribe to healthcheckv2's gRPC Health.Watch stream (overall
    # collector health) and reflect status changes into STATUS= updates.
    deep_healthcheck: true
    # healthcheckv2: healthcheckv2   # default; uncomment only to override
    # Optional: pin the dial endpoint explicitly if sibling-config lookup
    # ever proves brittle. Leaving it empty (recommended) lets sdnotify
    # read the endpoint from the healthcheckv2 extension above.
    # healthcheckv2_grpc_endpoint: localhost:13132

receivers:
  file_log:
    include: [ ./input/*.log ]
    start_at: beginning
    include_file_name: true
    include_file_path: true

exporters:
  debug:
    verbosity: detailed

service:
  extensions: [healthcheckv2, bearertokenauth, sdnotify]
  pipelines:
    logs:
      receivers: [file_log]
      exporters: [debug]
